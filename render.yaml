services:
  - type: web
    name: task-management-system-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: CLIENT_ORIGIN
        value: https://taskora.vendra.best,https://taskora-frontend.onrender.com,https://task-management-system-pi-five.vercel.app,http://localhost:5173
      - key: API_BASE_URL
        value: https://task-management-system-backend-z9y4.onrender.com
      - key: DB_SSL
        value: "true"
      - key: SUPABASE_POOLER_HOST
        value: aws-1-ap-southeast-1.pooler.supabase.com
      - key: FRONTEND_URL
        value: https://taskora.vendra.best
      # Set in Render dashboard (secrets):
      # RESEND_API_KEY=re_xxxx  (required — set in Render dashboard)
      # EMAIL_FROM=Taskora <noreply@vendra.best>  (optional — defaults to onboarding@resend.dev)
      # DATABASE_URL from Supabase

  - type: web
    name: taskora-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    domains:
      - taskora.vendra.best
    routes:
      - type: rewrite
        source: /api/*
        destination: https://task-management-system-backend-z9y4.onrender.com/api/*
      - type: rewrite
        source: /socket.io/*
        destination: https://task-management-system-backend-z9y4.onrender.com/socket.io/*
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    envVars:
      - key: VITE_API_BASE
        value: /api
      - key: VITE_SOCKET_URL
        value: https://task-management-system-backend-z9y4.onrender.com
