name: CI/CD Pipeline

on:
  push:
    branches: [main, feature/deployment]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('frontend/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: hashFiles('frontend/package.json') != ''
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        if: hashFiles('frontend/package.json') != ''
        working-directory: ./frontend
        run: npm run build

      - name: Skip frontend build
        if: hashFiles('frontend/package.json') == ''
        run: echo "Frontend source is not available yet — skipping build."

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Verify backend modules load
        working-directory: ./backend
        run: node -e "require('./config/swagger')"
